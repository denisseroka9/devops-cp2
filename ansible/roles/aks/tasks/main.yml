---
- name: Create namespace for Kubernetes application
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: web-k8s

- name: Create persistent volume claim
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('template', 'pvc.yml.j2') }}"       

- name: Deploy application in AKS
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('template', 'deployment.yml.j2') }}"

- name: Create service for application
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('template', 'service.yml.j2') }}"